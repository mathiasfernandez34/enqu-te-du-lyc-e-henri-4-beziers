<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Information & Ressources</title>
    <style>
        :root {
            /* Fond moins noir : passage à un gris anthracite doux */
            --bg-color: #18181b; 
            --card-bg: #202024;
            --border-color: #2e2e33;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
            --accent-hover: #e4e4e7;
            --btn-text: #000000;
            --select-bg: #2e2e33;
        }

        /* Mode clair automatique */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f4f4f5;
                --card-bg: #ffffff;
                --border-color: #e4e4e7;
                --text-main: #09090b;
                --text-muted: #71717a;
                --accent: #09090b;
                --accent-hover: #27272a;
                --btn-text: #ffffff;
                --select-bg: #f4f4f5;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
            transition: background-color 0.3s ease;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        /* Section Visuel (Gauche) */
        .preview-section {
            background: linear-gradient(135deg, #27272a, #18181b);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-right: 1px solid var(--border-color);
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 3 / 4;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poster-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .preview-section:hover .poster-wrapper {
            transform: scale(1.03) translateY(-4px);
        }

        /* Section Contenu (Droite) */
        .content-section {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            align-self: flex-start;
            background-color: var(--border-color);
            color: var(--text-main);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background-color: var(--accent);
            color: var(--btn-text);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 28px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Zone Menu Déroulant (Ressources) */
        .dropdown-container {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .dropdown-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            margin-bottom: 8px;
            display: block;
        }

        .custom-select {
            width: 100%;
            padding: 12px;
            background-color: var(--select-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .custom-select:focus {
            border-color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .preview-section {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 40px 20px;
            }
            .content-section {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Côté Gauche : Aperçu de l'affiche -->
        <div class="preview-section">
            <div class="poster-wrapper">
                <img src="affiche.jpg" alt="Aperçu de l'affiche" class="poster-preview">
            </div>
        </div>

        <!-- Côté Droite : Informations et Actions -->
        <div class="content-section">
            <div class="badge">Sensibilisation</div>
            <h1>Campagne d'information</h1>
            <p>Consultez notre affiche officielle pour découvrir les initiatives et les données clés de cette campagne.</p>
            
            <!-- Lien d'action Principal -->
            <a href="affiche.jpg" target="_blank" class="btn">
                <span>Ouvrir l'affiche</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
            </a>

            <!-- Menu déroulant vers les plateformes gouvernementales -->
            <div class="dropdown-container">
                <label class="dropdown-label" for="gouv-links">Plateformes Officielles (.gouv)</label>
                <select id="gouv-links" class="custom-select" onchange="navigateToSite(this)">
                    <option value="" disabled selected>Sélectionner une ressource d'aide...</option>
                    <option value="https://www.arretonslesviolences.gouv.fr/">Arrêtons les Violences (Signalement & Info)</option>
                    <option value="https://www.egalite-femmes-hommes.gouv.fr/">Secrétariat d'État à l'Égalité Femmes-Hommes</option>
                    <option value="https://www.service-public.fr/particuliers/vosdroits/F34303">Service-Public | Droits face au harcèlement sexuel</option>
                </select>
            </div>
        </div>

    </div>

    <!-- Script JavaScript pour gérer la redirection immédiate au choix dans le menu -->
    <script>
        function navigateToSite(selectElement) {
            const url = selectElement.value;
            if (url) {
                // Ouvre le site officiel dans un nouvel onglet pour ne pas perdre la page actuelle
                window.open(url, '_blank');
                // Réinitialise le menu sur le message par défaut
                selectElement.selectedIndex = 0;
            }
        }
    </script>

</body>
</html>
